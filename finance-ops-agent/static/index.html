<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Ops AI Agent</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1117;color:#e1e4e8;height:100vh;display:flex;flex-direction:column}
.header{background:#161b22;border-bottom:1px solid #30363d;padding:14px 24px;display:flex;align-items:center;gap:12px}
.header-icon{width:36px;height:36px;background:#1f6feb;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.header-title{font-size:16px;font-weight:600}
.header-sub{font-size:12px;color:#8b949e}
.status{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:12px;color:#3fb950}
.dot{width:8px;height:8px;background:#3fb950;border-radius:50%}
.sidebar{position:fixed;left:0;top:65px;bottom:0;width:200px;background:#161b22;border-right:1px solid #30363d;padding:16px 0;overflow-y:auto}
.sidebar-item{padding:10px 20px;cursor:pointer;font-size:13px;color:#8b949e;display:flex;align-items:center;gap:8px;transition:all .15s}
.sidebar-item:hover{background:#21262d;color:#e1e4e8}
.sidebar-item.active{background:#1f6feb22;color:#58a6ff;border-left:2px solid #1f6feb}
.main{margin-left:200px;flex:1;display:flex;flex-direction:column;height:calc(100vh - 65px)}
.quick-actions{padding:20px 24px 0;display:flex;gap:10px;flex-wrap:wrap}
.qa-btn{background:#21262d;border:1px solid #30363d;border-radius:8px;padding:8px 14px;font-size:12px;color:#8b949e;cursor:pointer;transition:all .15s}
.qa-btn:hover{border-color:#1f6feb;color:#58a6ff}
.messages{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:16px}
.msg{display:flex;gap:12px;max-width:85%}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.msg.assistant .msg-avatar{background:#1f6feb22}
.msg.user .msg-avatar{background:#388bfd22}
.msg-bubble{background:#21262d;border:1px solid #30363d;border-radius:12px;padding:12px 16px;font-size:14px;line-height:1.6;white-space:pre-wrap}
.msg.user .msg-bubble{background:#1f3a5f;border-color:#1f6feb44}
.typing{display:flex;gap:4px;align-items:center;padding:4px 0}
.typing span{width:6px;height:6px;background:#58a6ff;border-radius:50%;animation:bounce 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}}
.input-area{padding:16px 24px 20px;border-top:1px solid #30363d;background:#0f1117}
.input-row{display:flex;gap:10px;align-items:flex-end}
textarea{flex:1;background:#21262d;border:1px solid #30363d;border-radius:10px;color:#e1e4e8;padding:12px 16px;font-size:14px;resize:none;min-height:48px;max-height:160px;font-family:inherit;transition:border-color .15s;outline:none}
textarea:focus{border-color:#1f6feb}
textarea::placeholder{color:#484f58}
.send-btn{background:#1f6feb;border:none;border-radius:10px;width:48px;height:48px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s;flex-shrink:0}
.send-btn:hover{background:#388bfd}
.send-btn:disabled{background:#21262d;cursor:not-allowed}
.send-btn svg{width:20px;height:20px;fill:white}
.welcome{text-align:center;padding:40px 20px;color:#8b949e}
.welcome h2{font-size:20px;color:#e1e4e8;margin-bottom:8px}
.welcome p{font-size:14px;line-height:1.6}
.error-msg{color:#f85149;background:#ff000011;border:1px solid #f8514933;border-radius:8px;padding:10px 14px;font-size:13px}
</style>
</head>
<body>
<div class="header">
  <div class="header-icon">💼</div>
  <div><div class="header-title">Finance Ops AI Agent</div><div class="header-sub">Powered by Claude + QuickBooks</div></div>
  <div class="status"><div class="dot"></div> Conectado</div>
</div>
<div class="sidebar">
  <div class="sidebar-item active" onclick="setMode('chat',this)">💬 Chat IA</div>
  <div class="sidebar-item" onclick="setMode('audit',this)">🔍 Auditor QBO</div>
  <div class="sidebar-item" onclick="setMode('controller',this)">📊 Controller</div>
  <div class="sidebar-item" onclick="setMode('grants',this)">📋 Subvenciones</div>
  <div class="sidebar-item" onclick="setMode('sop',this)">📖 SOPs</div>
  <div class="sidebar-item" onclick="setMode('eod',this)">📅 Reporte EOD</div>
</div>
<div class="main">
  <div class="quick-actions">
    <button class="qa-btn" onclick="quickAsk('Dame un resumen financiero de Allapattah CDC para enero-julio 2026')">📈 Resumen ACDC</button>
    <button class="qa-btn" onclick="quickAsk('¿Cuánto hemos gastado en payroll este año?')">👥 Payroll YTD</button>
    <button class="qa-btn" onclick="quickAsk('¿Cuáles son los grants activos y su cumplimiento?')">📋 Grants</button>
    <button class="qa-btn" onclick="quickAsk('Genera el reporte de cierre de hoy')">📅 Cierre del día</button>
    <button class="qa-btn" onclick="quickAsk('Dame el briefing financiero de la mañana')">☀️ Briefing</button>
  </div>
  <div class="messages" id="messages">
    <div class="welcome"><h2>¡Hola Angela! 👋</h2><p>Soy tu asistente de finanzas con acceso directo a QuickBooks.<br>Puedes preguntarme sobre ingresos, gastos, grants, vendors, y más.</p></div>
  </div>
  <div class="input-area">
    <div class="input-row">
      <textarea id="input" placeholder="Escribe tu pregunta financiera aquí..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
    </div>
  </div>
</div>
<script>
const API_KEY='allapattah-2026';
let mode='chat';
let history=[];
function setMode(m,el){mode=m;document.querySelectorAll('.sidebar-item').forEach(e=>e.classList.remove('active'));el.classList.add('active');const ph={chat:'Escribe tu pregunta financiera...',audit:'Ej: Audita las transacciones de junio 2026...',controller:'Ej: Dame el briefing de la mañana...',grants:'Ej: ¿Cómo está el cumplimiento del grant de HUD?',sop:'Ej: Crea un SOP para cuentas por pagar...',eod:'Genera el reporte de cierre de hoy'};document.getElementById('input').placeholder=ph[m]||ph.chat;}
function quickAsk(t){document.getElementById('input').value=t;sendMessage();}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,160)+'px';}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
function addMsg(role,content){const msgs=document.getElementById('messages');const w=msgs.querySelector('.welcome');if(w)w.remove();const d=document.createElement('div');d.className=`msg ${role}`;d.innerHTML=`<div class="msg-avatar">${role==='user'?'👤':'🤖'}</div><div class="msg-bubble">${content}</div>`;msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;}
function addTyping(){const msgs=document.getElementById('messages');const d=document.createElement('div');d.className='msg assistant';d.id='typing';d.innerHTML='<div class="msg-avatar">🤖</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>';msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;}
async function sendMessage(){const inp=document.getElementById('input');const text=inp.value.trim();if(!text)return;inp.value='';inp.style.height='auto';document.getElementById('sendBtn').disabled=true;addMsg('user',text);history.push({role:'user',content:text});addTyping();try{let endpoint='/api/v1/chat';let body={message:text,conversation_history:history,user_id:'angela'};if(mode==='audit'){endpoint='/api/v1/audit/ask';body={question:text,user_id:'angela'};}else if(mode==='controller'){endpoint='/api/v1/controller/ask';body={question:text,user_id:'angela'};}else if(mode==='grants'){endpoint='/api/v1/grants/audit';body={grant_names:[text],user_id:'angela'};}else if(mode==='sop'){endpoint='/api/v1/sops/build/quick';body={description:text,user_id:'angela'};}else if(mode==='eod'){endpoint='/api/v1/eod/generate';body={notes:text,user_id:'angela'};}const r=await fetch(endpoint,{method:'POST',headers:{'Content-Type':'application/json','X-API-Key':API_KEY},body:JSON.stringify(body)});const typing=document.getElementById('typing');if(typing)typing.remove();const data=await r.json();let reply=data.response||data.message||data.content||data.summary||data.sop||data.report||(data.detail?'⚠️ '+data.detail:JSON.stringify(data,null,2));if(!data.detail)history.push({role:'assistant',content:reply});addMsg('assistant',reply);}catch(err){const typing=document.getElementById('typing');if(typing)typing.remove();addMsg('assistant',`<span class="error-msg">❌ Error: ${err.message}</span>`);}document.getElementById('sendBtn').disabled=false;document.getElementById('input').focus();}
</script>
</body>
</html>
